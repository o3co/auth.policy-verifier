name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ hashFiles('**/package.json') }}
          restore-keys: pnpm-store-

      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm -r --if-present run typecheck
      - run: pnpm run test:coverage

      - name: Upload coverage to Codecov (core)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/coverage/coverage-final.json
          flags: core
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (builtins)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/builtins/coverage/coverage-final.json
          flags: builtins
          fail_ci_if_error: false

      - name: Upload coverage to Codecov (server)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/server/coverage/coverage-final.json
          flags: server
          fail_ci_if_error: false
